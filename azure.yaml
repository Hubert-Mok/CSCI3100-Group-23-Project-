# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: cuhk-marketplace
metadata:
  template: cuhk-marketplace-azure@0.1.0
infra:
  provider: bicep
  path: infra
workflows:
  up:
    steps:
      - azd: provision
      - azd: deploy --all
services:
  web:
    project: ./
    language: docker
    host: containerapp
    docker:
      path: Dockerfile
      context: .
